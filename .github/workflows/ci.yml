name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write
  pull-requests: write

env:
  AWS_REGION: us-east-2
  TERRAFORM_VERSION: "1.5"
  PYTHON_VERSION: "3.12"

jobs:
  check:
    name: Lint / Type-check / Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check src tests

      - name: Ruff format
        run: ruff format --check src tests

      - name: Mypy
        run: mypy

      - name: Pytest
        run: pytest --cov=address_validation --cov-report=term-missing

  smoke-test:
    name: Smoke test (Docker)
    needs: check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Start Lambda container
        run: |
          echo "GOOGLE_MAPS_API_KEY=ci-dummy-key" > .env
          docker compose up -d --build --wait

      - name: Invoke Lambda
        run: |
          RESPONSE=$(curl -sf -X POST "http://localhost:9000/2015-03-31/functions/function/invocations" \
            -H "Content-Type: application/json" \
            -d '{
              "body": "{\"address\":{\"lines\":[\"1600 Amphitheatre Parkway\"],\"city\":\"Mountain View\",\"state\":\"CA\",\"postal_code\":\"94043\",\"country\":\"US\"}}",
              "isBase64Encoded": false
            }')

          echo "Response: $RESPONSE"

          echo "$RESPONSE" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert 'statusCode' in data, f'Missing statusCode: {data}'
          body = json.loads(data['body'])
          # With a dummy API key, Google rejects -> 502
          # This validates the Lambda boots, parses input, and returns structured JSON
          assert data['statusCode'] in (200, 502), f'Unexpected status: {data[\"statusCode\"]}'
          if data['statusCode'] == 200:
              for key in ('is_valid', 'address', 'validation_results', 'formatted_address', 'original_address', 'original_response'):
                  assert key in body, f'Missing {key} in response body'
          else:
              assert 'error' in body, f'Missing error in response body'
          print(f'Smoke test passed (status={data[\"statusCode\"]})')
          "

      - name: Stop container
        if: always()
        run: docker compose down

  terraform-validate:
    name: Terraform validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Create placeholder lambda.zip
        run: echo "placeholder" | zip -q ../lambda.zip -
        working-directory: terraform

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform fmt
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  terraform-plan:
    name: Terraform plan
    if: github.event_name == 'pull_request'
    needs: [check, terraform-validate]
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      - uses: actions/checkout@v4

      - name: Create placeholder lambda.zip
        run: echo "placeholder" | zip -q ../lambda.zip -

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Terraform init
        run: terraform init

      - name: Terraform plan
        id: plan
        run: terraform plan -no-color -out=tfplan
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📖\`${{ steps.plan.outcome }}\`

            <details><summary>Show Plan</summary>

            \`\`\`terraform
            ${{ steps.plan.outputs.stdout }}
            \`\`\`

            </details>

            *Triggered by @${{ github.actor }} in commit ${{ github.sha }}*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output,
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
