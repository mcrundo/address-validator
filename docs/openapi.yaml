openapi: "3.1.0"
info:
  title: Address Validation Service
  description: |
    Validates and normalizes postal addresses using the Google Maps Address Validation API.
    Deployed as an AWS Lambda function behind API Gateway.
  version: "1.0.0"
  license:
    name: MIT
    identifier: MIT

servers:
  - url: https://{api_id}.execute-api.us-east-2.amazonaws.com
    description: AWS API Gateway
    variables:
      api_id:
        default: placeholder
        description: API Gateway ID (set after deployment)

security:
  - apiKey: []

paths:
  /v1/health:
    get:
      summary: Health check
      description: Returns 200 OK if the service is running. No auth required, no external calls.
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: ["ok"]
              example:
                status: "ok"

  /v1/validate:
    post:
      summary: Validate and normalize an address
      description: |
        Accepts a raw address, validates it against the Google Maps Address Validation API,
        and returns a normalized, structured address with validation metadata.
      operationId: validateAddress
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateRequest"
            example:
              address:
                lines:
                  - "1600 Amphitheatre Parkway"
                city: "Mountain View"
                state: "CA"
                postal_code: "94043"
                country: "US"
      responses:
        "200":
          description: Address validated and normalized successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateResponse"
              example:
                is_valid: true
                address:
                  line1: "1600 Amphitheatre Pkwy"
                  line2: null
                  city: "Mountain View"
                  state: "CA"
                  postal_code: "94043-1351"
                  country: "US"
                validation_results:
                  granularity: "premise"
                  messages:
                    - source: "google_maps"
                      code: "street_number.confirmed"
                      text: "Street number confirmed"
                      type: "info"
                    - source: "google_maps"
                      code: "route.confirmed"
                      text: "Route confirmed"
                      type: "info"
                formatted_address: "1600 Amphitheatre Pkwy, Mountain View, CA 94043-1351, USA"
                original_address:
                  lines:
                    - "1600 Amphitheatre Parkway"
                  city: "Mountain View"
                  state: "CA"
                  postal_code: "94043"
                  country: "US"
        "400":
          description: Invalid request (missing or malformed input)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                missing_address:
                  summary: Missing address field
                  value:
                    error: "Missing required field: address"
                missing_lines:
                  summary: Missing address lines
                  value:
                    error: "address.lines must be a non-empty array of strings"
                invalid_json:
                  summary: Malformed JSON body
                  value:
                    error: "Request body is not valid JSON"
        "502":
          description: Upstream Google Maps API error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              examples:
                timeout:
                  summary: API timeout
                  value:
                    error: "Google Maps API request timed out"
                permission_denied:
                  summary: Invalid API key
                  value:
                    error: "Google Maps API returned 403: Permission denied"
        "403":
          description: Unauthorized — missing or invalid API key
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Forbidden"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: "Internal server error"

components:
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: x-api-key
      description: API key for authenticating requests. Stored in AWS Secrets Manager.

  schemas:
    ValidateRequest:
      type: object
      required:
        - address
      properties:
        address:
          $ref: "#/components/schemas/AddressInput"

    AddressInput:
      type: object
      required:
        - lines
      properties:
        lines:
          type: array
          items:
            type: string
          minItems: 1
          description: Street address lines (e.g. ["350 5th Ave", "Ste 3301"])
        city:
          type: string
          description: City or locality
          default: ""
        state:
          type: string
          description: State or administrative area
          default: ""
        postal_code:
          type: string
          description: ZIP or postal code
          default: ""
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code
          default: "US"

    NormalizedAddress:
      type: object
      required:
        - line1
        - line2
        - city
        - state
        - postal_code
        - country
      properties:
        line1:
          type: string
          description: Primary street address line
        line2:
          type:
            - string
            - "null"
          description: Secondary address line (unit, suite, etc.) or null
        city:
          type: string
          description: City or locality
        state:
          type: string
          description: State or administrative area abbreviation
        postal_code:
          type: string
          description: ZIP or postal code (may include +4 extension)
        country:
          type: string
          description: ISO 3166-1 alpha-2 country code

    ValidationMessage:
      type: object
      required:
        - source
        - code
        - text
        - type
      properties:
        source:
          type: string
          description: Validation source (e.g. "google_maps")
        code:
          type: string
          description: Machine-readable code (e.g. "street_number.confirmed")
        text:
          type: string
          description: Human-readable description
        type:
          type: string
          enum: ["info", "warning", "error"]
          description: Severity level

    ValidationResults:
      type: object
      required:
        - granularity
        - messages
      properties:
        granularity:
          type: string
          description: |
            How precisely the address was resolved. Lowercased from Google's
            validationGranularity (e.g. "premise", "sub_premise", "route", "unknown").
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ValidationMessage"
          description: Per-component validation messages

    ValidateResponse:
      type: object
      required:
        - is_valid
        - address
        - validation_results
        - formatted_address
        - original_address
        - original_response
      properties:
        is_valid:
          type: boolean
          description: Whether the address is considered complete and valid
        address:
          $ref: "#/components/schemas/NormalizedAddress"
        validation_results:
          $ref: "#/components/schemas/ValidationResults"
        formatted_address:
          type: string
          description: Single-line formatted address from Google Maps
        original_address:
          $ref: "#/components/schemas/AddressInput"
        original_response:
          type: object
          description: Raw response from the Google Maps Address Validation API

    Error:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message
